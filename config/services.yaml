# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.mail.from_email: '%env(MAIL_FROM_ADDRESS)%'
    app.mail.from_name: '%env(MAIL_FROM_NAME)%'
    # US-094 (sprint-017 EPIC-002) — Slack alerting fallback channel
    default_slack_channel: '#alerts-prod'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Entity/'
            - '../src/Domain/'
            - '../src/Factory/'
            - '../src/Story/'
            - '../src/Kernel.php'

    # DDD Layers - Domain (no services, pure PHP)

    # DDD Layers - Application
    App\Application\:
        resource: '../src/Application/'

    # DDD Layers - Infrastructure
    App\Infrastructure\:
        resource: '../src/Infrastructure/'

    # DDD Layers - Presentation
    App\Presentation\:
        resource: '../src/Presentation/'

    # Vacation Bounded Context - Interface bindings
    App\Domain\Vacation\Repository\VacationRepositoryInterface:
        alias: App\Infrastructure\Vacation\Persistence\Doctrine\DoctrineVacationRepository

    # Client Bounded Context - Interface bindings (EPIC-001 Phase 2/3)
    App\Domain\Client\Repository\ClientRepositoryInterface:
        alias: App\Infrastructure\Client\Persistence\Doctrine\DoctrineDddClientRepository

    # Project Bounded Context - Interface bindings (EPIC-001 Phase 2/3)
    App\Domain\Project\Repository\ProjectRepositoryInterface:
        alias: App\Infrastructure\Project\Persistence\Doctrine\DoctrineDddProjectRepository

    # DSO Read-Model Repository (EPIC-003 Phase 4 sprint-024 US-110)
    # T-110-02 Doctrine adapter + T-110-03 caching decorator (cache.kpi 1h TTL)
    # public: true tant que pas de consumer downstream (T-110-04 Widget + Slack)
    App\Domain\Project\Repository\DsoReadModelRepositoryInterface:
        alias: App\Infrastructure\Project\Persistence\Doctrine\CachingDsoReadModelRepository
        public: true

    App\Infrastructure\Project\Persistence\Doctrine\CachingDsoReadModelRepository:
        arguments:
            $inner: '@App\Infrastructure\Project\Persistence\Doctrine\DoctrineDsoReadModelRepository'
            $kpiCache: '@cache.kpi'

    # T-110-03 Subscriber InvoicePaidEvent → invalide cache.kpi pool
    App\Application\Project\EventListener\InvalidateDsoCacheOnInvoicePaid:
        arguments:
            $kpiCache: '@cache.kpi'

    # Billing Lead Time Read-Model Repository (EPIC-003 Phase 4 sprint-024 US-111)
    # T-111-02 Doctrine adapter + T-111-03 caching decorator (cache.kpi 1h TTL)
    # public: true tant que pas de consumer downstream (T-111-04 Widget Twig)
    App\Domain\Project\Repository\BillingLeadTimeReadModelRepositoryInterface:
        alias: App\Infrastructure\Project\Persistence\Doctrine\CachingBillingLeadTimeReadModelRepository
        public: true

    App\Infrastructure\Project\Persistence\Doctrine\CachingBillingLeadTimeReadModelRepository:
        arguments:
            $inner: '@App\Infrastructure\Project\Persistence\Doctrine\DoctrineBillingLeadTimeReadModelRepository'
            $kpiCache: '@cache.kpi'

    # T-111-03 Subscriber InvoiceCreatedEvent → invalide cache.kpi pool
    App\Application\Project\EventListener\InvalidateBillingLeadTimeCacheOnInvoiceCreated:
        arguments:
            $kpiCache: '@cache.kpi'

    # Revenue Forecast Read-Model Repository (EPIC-003 Phase 5 sprint-025 US-114)
    # T-114-02 Doctrine adapter + T-114-03 caching decorator (cache.kpi 1h TTL)
    # Invalidation event-driven : OrderStatusChangedEvent + InvoiceCreatedEvent
    App\Domain\Project\Repository\RevenueForecastReadModelRepositoryInterface:
        alias: App\Infrastructure\Project\Persistence\Doctrine\CachingRevenueForecastReadModelRepository
        public: true

    App\Infrastructure\Project\Persistence\Doctrine\CachingRevenueForecastReadModelRepository:
        arguments:
            $inner: '@App\Infrastructure\Project\Persistence\Doctrine\DoctrineRevenueForecastReadModelRepository'
            $kpiCache: '@cache.kpi'

    App\Application\Project\EventListener\InvalidateRevenueForecastCacheOnOrderStatusChanged:
        arguments:
            $kpiCache: '@cache.kpi'

    App\Application\Project\EventListener\InvalidateRevenueForecastCacheOnInvoiceCreated:
        arguments:
            $kpiCache: '@cache.kpi'

    # Margin Adoption Read-Model Repository (EPIC-003 Phase 4 sprint-024 US-112 T-112-02)
    # public: true tant que pas de consumer downstream (T-112-03 Widget)
    App\Domain\Project\Repository\MarginAdoptionReadModelRepositoryInterface:
        alias: App\Infrastructure\Project\Persistence\Doctrine\DoctrineMarginAdoptionReadModelRepository
        public: true

    # T-112-04 Margin adoption red threshold checker (Slack persistent 7j)
    App\Application\Project\Alerting\CheckMarginAdoptionRedThresholdHandler:
        arguments:
            $kpiCache: '@cache.kpi'

    # WorkItem Migration (EPIC-003 Phase 4 sprint-024 US-113 T-113-02 + T-113-03)
    App\Domain\WorkItem\Migration\HourlyRateProviderInterface:
        alias: App\Infrastructure\WorkItem\Migration\DoctrineHourlyRateProvider

    App\Domain\WorkItem\Migration\LegacyTimesheetReadModelRepositoryInterface:
        alias: App\Infrastructure\WorkItem\Migration\DoctrineLegacyTimesheetReadModelRepository

    App\Domain\WorkItem\Migration\WorkItemMigrator:
        autowire: true
        autoconfigure: true

    # T-113-03 + T-113-04 — Symfony command bind project dir for CSV path
    App\Command\MigrateWorkItemLegacyCostCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Order Bounded Context - Interface bindings (EPIC-001 Phase 2/3)
    App\Domain\Order\Repository\OrderRepositoryInterface:
        alias: App\Infrastructure\Order\Persistence\Doctrine\DoctrineDddOrderRepository

    # Invoice Bounded Context - Interface bindings (EPIC-001 Phase 2 sprint-012)
    App\Domain\Invoice\Repository\InvoiceRepositoryInterface:
        alias: App\Infrastructure\Invoice\Persistence\Doctrine\DoctrineDddInvoiceRepository

    # Contributor Bounded Context - Interface bindings (sprint-015 buffer promotion)
    App\Domain\Contributor\Repository\ContributorRepositoryInterface:
        alias: App\Infrastructure\Contributor\Persistence\Doctrine\DoctrineDddContributorRepository

    # EmploymentPeriod Bounded Context - ACL adapter binding (sprint-021 US-100, AT-3.1 ADR-0016)
    App\Domain\EmploymentPeriod\Repository\EmploymentPeriodRepositoryInterface:
        alias: App\Infrastructure\EmploymentPeriod\Persistence\Doctrine\DoctrineEmploymentPeriodAdapter

    # WorkItem Bounded Context - Interface binding (sprint-020 #207 EPIC-003 Phase 2 ACL)
    App\Domain\WorkItem\Repository\WorkItemRepositoryInterface:
        alias: App\Infrastructure\WorkItem\Persistence\Doctrine\DoctrineDddWorkItemRepository

    # WorkItem Domain Service — Domain pure mais nécessite autowire explicite
    # car src/Domain/ exclu de l'auto-resolution (sprint-021 US-100/US-099)
    App\Domain\WorkItem\Service\DailyHoursValidator:
        autowire: true
        autoconfigure: true

    # Billing Lead Time Domain Service (sprint-024 US-111 T-111-01) — Domain pure, autowire explicite
    App\Domain\Project\Service\BillingLeadTimeCalculator:
        autowire: true
        autoconfigure: true

    # DSO Domain Service (sprint-024 US-110 T-110-01) — Domain pure, autowire explicite
    App\Domain\Project\Service\DsoCalculator:
        autowire: true
        autoconfigure: true

    # Margin Adoption Domain Service (sprint-024 US-112 T-112-01) — Domain pure, autowire explicite
    App\Domain\Project\Service\MarginAdoptionCalculator:
        autowire: true
        autoconfigure: true

    # SlackAlertingInterface binding (sprint-021 US-103) — extracted interface
    # pour mockabilité tests Application Layer
    App\Service\Alerting\SlackAlertingInterface:
        alias: App\Service\Alerting\SlackAlertingService

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Doctrine Migrations DependencyFactory alias for autowiring
    Doctrine\Migrations\DependencyFactory: '@doctrine.migrations.dependency_factory'

    # AI Assistant Configuration
    App\Service\Planning\AI\PlanningAIAssistant:
        arguments:
            $openaiApiKey: '%env(OPENAI_API_KEY)%'
            $anthropicApiKey: '%env(ANTHROPIC_API_KEY)%'
            $geminiApiKey: '%env(GEMINI_API_KEY)%'

    # Migrations Sync Command
    App\Command\MigrationsSyncCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Backup commands (TEST-006)
    App\Command\BackupDumpCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\BackupRestoreCommand:
        arguments:
            $kernelEnvironment: '%kernel.environment%'

    # NPS Mailer Service
    App\Service\NpsMailerService:
        arguments:
            $fromEmail: '%app.mail.from_email%'
            $fromName: '%app.mail.from_name%'

    # Monolog Processors
    App\Monolog\Processor\ContextProcessor:
        arguments:
            $environment: '%kernel.environment%'
        tags:
            - { name: monolog.processor }

    App\Monolog\Processor\PerformanceProcessor:
        tags:
            - { name: monolog.processor, channel: performance }

    # Lead Magnet Mailer Service
    App\Service\LeadMagnetMailer:
        arguments:
            $fromEmail: '%app.mail.from_email%'
            $fromName: '%app.mail.from_name%'

    # Contributor Satisfaction Reminder Command
    App\Command\ContributorSatisfactionReminderCommand:
        arguments:
            $fromEmail: '%app.mail.from_email%'
            $fromName: '%app.mail.from_name%'

    # Analytics Dashboard Service with Redis cache
    App\Service\Analytics\DashboardReadService:
        arguments:
            $analyticsCache: '@cache.analytics'

    # Business KPI Service (US-093 sprint-017 EPIC-002)
    App\Service\Analytics\BusinessKpiService:
        arguments:
            $analyticsCache: '@cache.analytics'

    # Slack Alerting Service (US-094 sprint-017 EPIC-002)
    App\Service\Alerting\SlackAlertingService:
        arguments:
            $webhookUrl: '%env(default::SLACK_WEBHOOK_URL)%'
            $defaultChannel: '%env(default:default_slack_channel:SLACK_ALERTS_CHANNEL)%'

when@test:
    services:
        # Enable Foundry factories as services in test environment
        App\Factory\:
            resource: '../src/Factory/'
            autowire: true
            autoconfigure: true
