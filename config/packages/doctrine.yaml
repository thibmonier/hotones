doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
        types:
            vacation_id: App\Infrastructure\Vacation\Persistence\Doctrine\Type\VacationIdType
            vacation_status: App\Infrastructure\Vacation\Persistence\Doctrine\Type\VacationStatusType
            vacation_type: App\Infrastructure\Vacation\Persistence\Doctrine\Type\VacationTypeType
            daily_hours: App\Infrastructure\Vacation\Persistence\Doctrine\Type\DailyHoursType
    orm:
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
            DomainVacation:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Infrastructure/Vacation/Persistence/Doctrine/Mapping/Entity'
                prefix: 'App\Domain\Vacation\Entity'
                alias: DomainVacation
            DomainVacationValueObject:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Infrastructure/Vacation/Persistence/Doctrine/Mapping/ValueObject'
                prefix: 'App\Domain\Vacation\ValueObject'
                alias: DomainVacationValueObject
        dql:
            datetime_functions:
                YEAR: DoctrineExtensions\Query\Mysql\Year
                MONTH: DoctrineExtensions\Query\Mysql\Month
                DAY: DoctrineExtensions\Query\Mysql\Day
                DATEDIFF: DoctrineExtensions\Query\Mysql\DateDiff

        filters:
            tenant_filter:
                class: App\Infrastructure\Multitenant\Doctrine\Filter\TenantFilter
                enabled: false # Activated at runtime by TenantBootstrapListener (sprint-007 SEC-MULTITENANT-001)

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                # Doctrine result cache - query results caching
                doctrine.result_cache_pool:
                    adapter: cache.adapter.redis
                    default_lifetime: 3600  # 1 hour
                # Doctrine system cache - metadata caching
                doctrine.system_cache_pool:
                    adapter: cache.adapter.redis
                    default_lifetime: 86400  # 24 hours
