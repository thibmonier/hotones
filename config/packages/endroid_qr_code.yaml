# DEPS-001 (sprint-004) — config v6.1.0 selon le README officiel.
#
# Note : la v6.1.0 documente un schema `endroid_qr_code.<builderName>:`
# directement (sans wrapper `builders:`). L'auto-routing du bundle
# enregistre la route GET /qr-code/{builder}/{data} via
# RouteLoaderCompilerPass — plus besoin de config/routes/endroid_qr_code.yaml.
endroid_qr_code:
    default:
        writer: Endroid\QrCode\Writer\PngWriter
        size: 300
        margin: 10
        encoding: 'UTF-8'
        error_correction_level: 'low'
        round_block_size_mode: 'margin'
        validate_result: false
