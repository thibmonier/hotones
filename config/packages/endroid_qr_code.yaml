# DEPS-001 (sprint-004) — schema endroid/qr-code-bundle v7.x.
#
# La v7 reintroduit la cle racine `builders:` comme map des configurations.
# `route_enabled` et `route_prefix` sont top-level (pas dans builders).
endroid_qr_code:
    route_enabled: true
    route_prefix: /qr-code
    builders:
        default:
            writer: Endroid\QrCode\Writer\PngWriter
            size: 300
            margin: 10
            encoding: 'UTF-8'
            error_correction_level: 'low'
            round_block_size_mode: 'margin'
            validate_result: false
