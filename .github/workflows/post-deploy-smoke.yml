name: Post-Deploy Smoke Test

# US-092 (sprint-016 EPIC-002) — Smoke test minimum sur prod après merge main.
# Scope option PO atelier : homepage + /health (~30s execution).
#
# SMOKE-PROD-EXTENDED (sprint-018 EPIC-002) — étend le scope : login admin
# + accès dashboard business (lecture protégée). Skip silencieux si secrets
# `SMOKE_USER_EMAIL` + `SMOKE_USER_PASSWORD` absents (premier run).
#
# Trigger :
#   - push sur main (déclenché à chaque merge)
#   - workflow_dispatch (manuel)
#
# Sécurité : aucun input untrusted utilisé en run:. PROD_URL est statique,
# secrets pris via secrets.* (pas de github.event.* expansé inline).
# Smoke user dédié (no-2FA), permissions read-only minimal (ROLE_USER).

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: post-deploy-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    name: Smoke Test Prod (homepage + /health)
    runs-on: ubuntu-latest

    env:
      PROD_URL: https://hotones.onrender.com
      MAX_WAIT_SECONDS: 300  # 5 min max pour réveiller free tier (cold start)

    steps:
      - name: Wait for Render deploy completion
        # Render auto-deploy met ~5-10 min après merge main. On attend que
        # /health réponde 200 avant de lancer les assertions business.
        run: |
          set -euo pipefail
          echo "Waiting for /health to return 200..."

          start_ts=$(date +%s)
          while true; do
            now_ts=$(date +%s)
            elapsed=$((now_ts - start_ts))
            if [ "$elapsed" -gt "$MAX_WAIT_SECONDS" ]; then
              echo "::error::Health endpoint did not return 200 within ${MAX_WAIT_SECONDS}s"
              exit 1
            fi

            http_code=$(curl --max-time 30 -sS -o /tmp/health.body -w "%{http_code}" "$PROD_URL/health" || echo "000")

            if [ "$http_code" = "200" ]; then
              echo "Health endpoint responded 200 after ${elapsed}s"
              break
            fi

            echo "  /health returned $http_code (elapsed=${elapsed}s) — retrying in 10s"
            sleep 10
          done

      - name: Smoke test 1/2 — Homepage GET /
        run: |
          set -euo pipefail
          http_code=$(curl --max-time 30 -sS -o /tmp/homepage.body -w "%{http_code}" "$PROD_URL/")
          if [ "$http_code" != "200" ]; then
            echo "::error::Homepage returned $http_code (expected 200)"
            head -c 500 /tmp/homepage.body
            exit 1
          fi

          # Sanity check : Symfony rendered (HotOnes title in HTML)
          if ! grep -q "HotOnes" /tmp/homepage.body; then
            echo "::error::Homepage rendered but does not contain HotOnes title"
            head -c 500 /tmp/homepage.body
            exit 1
          fi

          echo "Homepage OK : 200 + HotOnes title found"

      - name: Smoke test 2/2 — Health JSON GET /health
        run: |
          set -euo pipefail
          http_code=$(curl --max-time 30 -sS -o /tmp/health.body -w "%{http_code}" "$PROD_URL/health")
          if [ "$http_code" != "200" ]; then
            echo "::error::/health returned $http_code (expected 200)"
            cat /tmp/health.body
            exit 1
          fi

          # Sanity check : JSON response (US-090 regression check : no raw PHP source)
          content_type=$(curl --max-time 30 -sS -I "$PROD_URL/health" | grep -i "content-type:" | tr -d '\r')
          if echo "$content_type" | grep -qi "application/octet-stream"; then
            echo "::error::/health returns octet-stream (US-090 regression : raw PHP source served)"
            exit 1
          fi

          # Body must NOT contain '<?php' literal (raw source leak detection)
          if grep -q "<?php" /tmp/health.body; then
            echo "::error::/health body contains literal <?php — Symfony route NOT executing"
            head -c 200 /tmp/health.body
            exit 1
          fi

          echo "Health OK : 200 + no PHP source leak"
          cat /tmp/health.body

      - name: Summary
        if: always()
        run: |
          echo "Post-deploy smoke test on $PROD_URL"
          echo "  - /health JSON 200"
          echo "  - / 200 + HotOnes title"

  smoke-extended:
    name: Smoke Extended Prod (login + dashboard + API DDD)
    needs: smoke
    runs-on: ubuntu-latest

    # SMOKE-PROD-EXTENDED (sprint-018) — assertions business authentifiées.
    # Skip silencieux si secrets manquants (premier run avant config OPS).
    if: ${{ vars.SMOKE_EXTENDED_ENABLED == 'true' }}

    env:
      PROD_URL: https://hotones.onrender.com

    steps:
      - name: Login as smoke user (form_login + CSRF)
        env:
          SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${SMOKE_USER_EMAIL:-}" ] || [ -z "${SMOKE_USER_PASSWORD:-}" ]; then
            echo "::error::Required secrets SMOKE_USER_EMAIL / SMOKE_USER_PASSWORD missing"
            exit 1
          fi

          # 1. GET /login → extract CSRF token from hidden input.
          curl --max-time 30 -c /tmp/cookies.txt -sS "$PROD_URL/login" -o /tmp/login.html
          csrf=$(grep -oE 'name="_csrf_token"[^>]+value="[^"]+"' /tmp/login.html \
            | head -n1 | sed -E 's/.*value="([^"]+)".*/\1/')

          if [ -z "$csrf" ]; then
            echo "::error::Failed to extract CSRF token from login form"
            head -c 500 /tmp/login.html
            exit 1
          fi

          # 2. POST /login (form_login) — follow redirects.
          http_code=$(curl --max-time 30 -b /tmp/cookies.txt -c /tmp/cookies.txt -sS -L \
            -o /tmp/post_login.html -w "%{http_code}" \
            -X POST "$PROD_URL/login" \
            --data-urlencode "_username=$SMOKE_USER_EMAIL" \
            --data-urlencode "_password=$SMOKE_USER_PASSWORD" \
            --data-urlencode "_csrf_token=$csrf")

          if [ "$http_code" != "200" ]; then
            echo "::error::Login POST returned $http_code (expected 200 after redirect chain)"
            head -c 500 /tmp/post_login.html
            exit 1
          fi

          # 3. Verify redirected to authenticated page (not login error).
          if grep -qE "Identifiants invalides|Invalid credentials|Login failed" /tmp/post_login.html; then
            echo "::error::Login failed — invalid credentials response"
            exit 1
          fi

          if ! grep -qiE "logout|déconnexion|déconnecter" /tmp/post_login.html; then
            echo "::error::Login appears to have failed (no logout link in response)"
            head -c 500 /tmp/post_login.html
            exit 1
          fi

          echo "Login OK : authenticated session cookie acquired"

      - name: Smoke business 1/2 — GET /admin/dashboard/business (KPIs)
        run: |
          set -euo pipefail

          http_code=$(curl --max-time 30 -b /tmp/cookies.txt -sS \
            -o /tmp/dashboard.html -w "%{http_code}" \
            "$PROD_URL/admin/dashboard/business")

          if [ "$http_code" != "200" ]; then
            echo "::error::Dashboard business returned $http_code (expected 200)"
            head -c 500 /tmp/dashboard.html
            exit 1
          fi

          # Sanity check : KPI markers présents (US-093 dashboard 7 KPIs).
          if ! grep -qiE "DAU|MAU|projets|devis|factures|revenu|marge" /tmp/dashboard.html; then
            echo "::error::Dashboard 200 but missing KPI markers (US-093 regression)"
            head -c 500 /tmp/dashboard.html
            exit 1
          fi

          echo "Dashboard business OK : 200 + KPI markers"

      - name: Smoke business 2/2 — GET /api/contributors/active (API DDD)
        run: |
          set -euo pipefail

          # Phase 3 strangler fig BC Contributor (sprint-018).
          response=$(curl --max-time 30 -b /tmp/cookies.txt -sS \
            -H "Accept: application/json" \
            -w "%{http_code}" \
            -o /tmp/contributors.json \
            "$PROD_URL/api/contributors/active")
          http_code="$response"

          if [ "$http_code" != "200" ]; then
            echo "::error::API contributors/active returned $http_code (expected 200)"
            head -c 500 /tmp/contributors.json
            exit 1
          fi

          # Verify JSON shape : `data` array + `meta.count` int.
          if ! python3 -c "
          import json, sys
          d = json.load(open('/tmp/contributors.json'))
          assert isinstance(d.get('data'), list), 'data must be array'
          assert isinstance(d.get('meta', {}).get('count'), int), 'meta.count must be int'
          assert d['meta']['count'] == len(d['data']), 'count must match data length'
          " 2>/tmp/jsonerr; then
            echo "::error::API contributors/active : JSON shape invalid"
            cat /tmp/jsonerr
            head -c 500 /tmp/contributors.json
            exit 1
          fi

          echo "API contributors/active OK : 200 + valid JSON shape"

      - name: Smoke extended summary
        if: always()
        run: |
          echo "Post-deploy smoke EXTENDED on $PROD_URL"
          echo "  - Login form_login + CSRF OK"
          echo "  - /admin/dashboard/business 200 + KPI markers"
          echo "  - /api/contributors/active 200 + JSON shape valid"
